dsn: memory

serve:
  public:
    base_url: http://localhost:8081/kratos
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:8081
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: http://localhost:8081/dashboard
  allowed_return_urls:
    - http://localhost:8081/welcome
    - http://localhost:8081/dashboard
    - http://localhost:8081

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Kratos
      enabled: false
    lookup_secret:
      enabled: false
    link:
      enabled: true
    code:
      enabled: true

  flows:
    error:
      ui_url: http://localhost:8081/error

    settings:
      ui_url: http://localhost:8081/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: http://localhost:8081/recovery
      use: link

    verification:
      enabled: true
      ui_url: http://localhost:8081/verification
      use: code
      after:
        default_browser_return_url: http://localhost:8081/dashboard

    logout:
      after:
        default_browser_return_url: http://localhost:8081

    login:
      ui_url: http://localhost:8081/login
      lifespan: 10m

    registration:
      lifespan: 10m
      ui_url: http://localhost:8081/registration
      after:
        password:
          hooks:
            - hook: session

log:
  level: trace
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json